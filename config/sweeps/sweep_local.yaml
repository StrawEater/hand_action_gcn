# Hyperparameter sweep for this server (Shift-GCN with variable depth).
# Run with: python sweep.py config/sweeps/sweep_local.yaml
#
# Full grid: 3 × 3 × 3 × 2 × 2 = 108 runs
# For a quick first pass use sweep_local_quick.yaml (18 runs).

sweep:
  base: config/sweeps/base_shift_gcn.yaml
  grid:
    model_args.layers_per_stage:
      depth6:  [2, 2, 2]
      depth7:  [3, 2, 2]
      depth10: [4, 3, 3]
    train_feeder_args.data_fraction:
      25pct: 0.25
      50pct: 0.50
      full:  1.0
    label_smoothing:
      ls0:    0.0
      ls01:   0.1
      ls025:  0.25
    mask_ratio:
      unmasked: 0.0
      masked:   0.25
    train_feeder_args.random_move:
      no_transform: false
      with_transform: true
