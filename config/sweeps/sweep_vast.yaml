# Hyperparameter sweep for Vast.ia (SkeletonMamba with variable size).
# Run with: python sweep.py config/sweeps/sweep_vast.yaml
#
# Full grid: 3 × 3 × 3 × 2 × 2 = 108 runs
# For a quick first pass use sweep_vast_quick.yaml (18 runs).

sweep:
  base: config/sweeps/base_skeleton_mamba.yaml
  grid:
    model_args.model_size:
      tiny:   tiny
      medium: medium
    train_feeder_args.data_fraction:
      25pct: 0.25
      50pct: 0.50
      full:  1.0
    mask_ratio:
      25-masked:   0.25
      50-masked:   0.50
      50-masked:   0.75
    transformations:
      transforms_on:
        train_feeder_args.random_move: true  
        train_feeder_args.random_shift: true
      transforms_off:
        train_feeder_args.random_move: false  
        train_feeder_args.random_shift: false