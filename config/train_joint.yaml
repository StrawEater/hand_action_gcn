optimizer: Adam
phase: train
print_log: true
save_interval: 2
save_score: false
seed: 1
show_topk:
- 1
- 5
start_epoch: 0
step:
- 40
- 60
- 80
test_batch_size: 32
test_feeder_args:
  data_path: ./data/oakink/val_data_joint.npy
  debug: false
  label_path: ./data/oakink/val_label.pkl
