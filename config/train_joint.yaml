  window_size: 32
train_feeder_args:
  data_path: ./data/oakink/train_data_joint.npy
  debug: false
  label_path: ./data/oakink/train_label.pkl
  normalization: false
  random_choose: true
  random_move: false
  random_shift: true
  window_size: 32
warm_up_epoch: 5
weight_decay: 0.01
label_smoothing: 0.1
mask_ratio: 0.0
recon_weight: 1.0
freeze_temporal: false
weights: /home/juani/Shift-GCN/save_models/ntu120_ShiftGCN_joint_xsub.pt
work_dir: ./work_dir/oakink_ShiftGCN_hand_joint
