Experiment_name: oakink_ShiftGCN_hand_joint
base_lr: 1.0e-3
batch_size: 128
config: config/train_joint.yaml
device:
- 0
eval_interval: 5
feeder: feeders.feeder.Feeder
log_interval: 100
model: model.shift_gcn.Model
model_args:
  graph: graph.hand_oakink.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  num_class: 32
  num_person: 1
  num_point: 42
model_saved_name: ./save_models/oakink_ShiftGCN_hand_joint
num_epoch: 100
num_worker: 12
phase: train
print_log: true
save_score: false
show_topk:
- 1
- 5
start_epoch: 0
test_batch_size: 128

test_feeder_args:
  data_path: ./data/oakink/val_data_joint.npy
  debug: false
  label_path: ./data/oakink/val_label.pkl
  normalization: false
  window_size: 8

train_feeder_args:
  data_path: ./data/oakink/train_data_joint.npy
  debug: false
  label_path: ./data/oakink/train_label.pkl
  normalization: false
  random_choose: false
  random_move: false
  random_shift: false
  window_size: 8

warm_up_epoch: 5
t_max_mult: 1

weight_decay: 0.001
label_smoothing: 0.1
mask_ratio: 0.001
mask_depth: 3
recon_weight: 0.1
freeze_temporal: false
work_dir: ./work_dir/oakink_ShiftGCN_hand_joint
