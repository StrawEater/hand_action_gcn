Experiment_name: oakink_ShiftGCN_hand_joint
base_lr: 1.0e-3
batch_size: 32
config: config/train_joint.yaml
device:
- 0
eval_interval: 5
feeder: feeders.feeder.Feeder
ignore_weights: []
log_interval: 100
model: model.shift_gcn.Model
model_args:
  graph: graph.hand_oakink.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  num_class: 32
  num_person: 1
  num_point: 42
model_saved_name: ./save_models/oakink_ShiftGCN_hand_joint
nesterov: true
num_epoch: 100
num_worker: 12
only_train_epoch: 1
