name: gcn
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch==2.5.1
  - torchvision==0.20.1
  - pytorch-cuda=12.1
  - numpy==2.2.6
  - pyyaml
  - tqdm
  - pillow
  - einops          # SkeletonMamba: rearrange ops
  - matplotlib      # sweep result plots
  - pip:
    - timm          # SkeletonMamba: trunc_normal_, DropPath
    - causal-conv1d # required by mamba_ssm (install first)
    - mamba-ssm     # SkeletonMamba: Mamba blocks + RMSNorm

# After creating the environment, build the CUDA shift extension:
#   cd model/Temporal_shift/cuda && pip install -e .
#
# mamba_ssm requires CUDA >= 11.6 and GPU compute capability >= 7.0
# To force rebuild from source:
#   CAUSAL_CONV1D_FORCE_BUILD=TRUE MAMBA_FORCE_BUILD=TRUE pip install mamba-ssm
